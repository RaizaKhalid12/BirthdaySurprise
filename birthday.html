<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎉 Birthday Surprise! 🎂</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: linear-gradient(to bottom, #a0e7e5, #b4f8c8);
      overflow: hidden;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #ff6f91;
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      color: #333;
    }
    button {
      background-color: #ffcbf2;
      border: none;
      padding: 15px 30px;
      margin-top: 30px;
      font-size: 1.2em;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.1);
    }
    .balloon {
      position: absolute;
      width: 50px;
      height: 70px;
      background: radial-gradient(circle at 50% 30%, #ff6f91, #ff3cac);
      border-radius: 50% 50% 50% 50%;
      animation: float 6s ease-in infinite;
    }
    @keyframes float {
      0% {transform: translateY(0px) rotate(0deg);}
      50% {transform: translateY(-600px) rotate(20deg);}
      100% {transform: translateY(0px) rotate(0deg);}
    }
  </style>
</head>
<body>

  <h1>// Happy Birthday! 🎉💖</h1>
  <p>Click the button below for a magical surprise 🪄✨</p>

  <button onclick="birthdayMagic()">Run Birthday Code 🎂</button>

  <!-- Balloons -->
  <div class="balloon" style="left:10%; animation-delay: 0s;"></div>
  <div class="balloon" style="left:30%; animation-delay: 2s;"></div>
  <div class="balloon" style="left:50%; animation-delay: 1s;"></div>
  <div class="balloon" style="left:70%; animation-delay: 3s;"></div>
  <div class="balloon" style="left:90%; animation-delay: 0.5s;"></div>

  <script>
    function birthdayMagic() {
      let hugs = 1000;
      let smiles = 9999;
      let love = '💖'.repeat(20);
      alert(`🎉 Happy Birthday!!! 🎉\n\nHugs: ${hugs}\nSmiles: ${smiles}\n\n${love}\n\nHave the best day ever! 😄`);
    }
  </script>
</body>
</html>
